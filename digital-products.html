<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Products – Aureate Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #000;
            /* PC background by default */
            background-image: url('./images/main_page_pc.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            gap: 60px;
            /* Increased gap */
            /* For the PC layout, items are aligned horizontally by default due to flex */
        }

        .btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #d4af37;
            /* Vintage yellow / gold */

            /* Fixed exact sizing regardless of text length */
            width: 380px;
            height: 90px;

            /* Flex layout to center text perfectly within the fixed box */
            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 1.6rem;
            /* Made fonts significantly larger */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        /* Switch to mobile background and stack vertical on narrow screens */
        @media (max-width: 768px) {
            body {
                background-image: url('./images/main_page_mobile.webp');
            }

            .btn-container {
                flex-direction: column;
                gap: 50px;
                /* Increased gap on mobile */
            }
        }
    </style>
</head>

<body>
    <div class="btn-container">
        <a href="#" class="btn">Free Wallpaper</a>
        <a href="#" class="btn">Ebooks</a>
    </div>
</body>

</html>
